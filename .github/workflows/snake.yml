name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"      # Auto-runs every night at midnight UTC
  workflow_dispatch:           # Enables manual trigger from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # Required to push the SVGs to the output branch

    steps:
      - name: Generate Snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ThurubilliSaiManoj2026    # Your exact GitHub username
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
